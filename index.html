<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff416c,#7c4dff);
color:white;
text-align:center;
overflow:hidden;
}

/* center */
.container{
position:relative;
top:10vh;
z-index:2;
}

/* glowing title */
h1{
font-size:42px;
text-shadow:0 0 10px #fff;
}

/* hidden message card */
.card{
background:rgba(255,255,255,0.15);
padding:20px;
margin:20px;
border-radius:15px;
display:none;
}

/* cake animation */
.cake{
font-size:70px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

/* buttons */
button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin:10px;
}

/* slideshow */
.slide{
width:220px;
height:220px;
margin:20px auto;
border-radius:20px;
background-size:cover;
animation:slides 10s infinite;
}

@keyframes slides{
0%{background-image:url('https://source.unsplash.com/300x300/?birthday')}
25%{background-image:url('https://source.unsplash.com/300x300/?cake')}
50%{background-image:url('https://source.unsplash.com/300x300/?balloons')}
75%{background-image:url('https://source.unsplash.com/300x300/?party')}
100%{background-image:url('https://source.unsplash.com/300x300/?gift')}
}

/* floating hearts */
.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:rise 6s infinite;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}
</style>
</head>

<body>

<div class="container">

<h1 id="wish"></h1>

<div class="slide"></div>

<div class="cake">🎂</div>

<button onclick="reveal()">🎁 Open Surprise</button>
<button onclick="toggleMusic()">🎵 Music</button>
<button onclick="celebrate()">🎆 Celebrate</button>

<div class="card" id="card">
💖 You are special!  
Wishing you endless happiness, success, and love 🎉
</div>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

// name from url
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Friend";

document.getElementById("wish").innerHTML =
"🎉 Happy Birthday " + name + " 🎉";

// confetti
function celebrate(){
confetti({
particleCount:250,
spread:160,
origin:{y:0.6}
});
}

// reveal message
function reveal(){
document.getElementById("card").style.display="block";
celebrate();
}

// music toggle
function toggleMusic(){
let music = document.getElementById("music");
if(music.paused){
music.play();
}else{
music.pause();
}
}

// floating hearts generator
setInterval(()=>{
let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(10+Math.random()*20)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
},500);

</script>

</body>
</html>
